    "hook": {
      "on-activate": "  # Install replicated CLI if not already present in the environment\n  if ! command -v replicated &> /dev/null; then\n    echo \"⚠ replicated CLI not found in PATH.\"\n    echo \"  Install it: curl -s https://api.github.com/repos/replicatedhq/replicated/releases/latest | grep browser_download_url | grep $(uname -s | tr '[:upper:]' '[:lower:]')_all.tar.gz | head -1 | cut -d '\\\"' -f 4 | xargs curl -sL | tar xz -C /usr/local/bin replicated\"\n  fi\n"
    },
    "profile": {
      "common": "  echo \"\"\n  echo \"Replicated Platform Examples dev environment\"\n  echo \"Tools: helm, kubectl, helmfile, task, just, make, yq, jq, yamllint, python3\"\n  echo \"\"\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux",
        "x86_64-darwin",
        "x86_64-linux"
      ]
