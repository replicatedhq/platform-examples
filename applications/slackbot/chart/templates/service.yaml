apiVersion: v1
kind: Service
metadata:
  name: {{ include "slackbot.fullname" . }}
  labels:
    {{- include "slackbot.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort | default "http" }}
      protocol: TCP
      name: http
    {{- if .Values.service.metrics }}
    - port: {{ .Values.service.metrics.port | default 9090 }}
      targetPort: {{ .Values.service.metrics.targetPort | default "metrics" }}
      protocol: TCP
      name: metrics
    {{- end }}
  selector:
    {{- include "slackbot.selectorLabels" . | nindent 4 }}
