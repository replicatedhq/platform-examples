apiVersion: v1
kind: Secret
metadata:
  name: {{ include "slackbot.fullname" . }}-secret
  labels:
    {{- include "slackbot.labels" . | nindent 4 }}
type: Opaque
data:
  SLACK_BOT_TOKEN: {{ .Values.slackbot.token | b64enc | quote }}
  SLACK_APP_TOKEN: {{ .Values.slackbot.appToken | b64enc | quote }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s-postgresql:5432/%s"
  .Values.postgresql.auth.username .Values.postgresql.auth.password
  .Release.Name .Values.postgresql.auth.database | b64enc | quote }}
