apiVersion: v2
name: slackbot
description: A Helm chart for deploying a Slackbot application with a
  PostgreSQL database

type: application

version: 0.1.0
appVersion: "1.0.0"

dependencies:
- name: postgresql
  version: "12.x.x"
  repository: "https://charts.bitnami.com/bitnami"
  condition: postgresql.enabled
- name: replicated
  repository: oci://registry.replicated.com/library
  version: 1.0.0-beta.32
