---
apiVersion: kots.io/v1beta1
kind: ConfigValues
metadata:
  name: storagebox
spec:
  values:
    # Gateway API Settings
    gateway_enabled:
      default: "1"
      value: "1"

    # Cassandra Settings (K8ssandra operator)
    cassandra_enabled:
      default: "0"
      value: "0"
    cassandra_mode:
      default: "simple"
      value: "simple"
    cassandra_user:
      default: "cassandra"
      value: "cassandra"
    cassandra_password:
      default: "cassandra"
      value: "cassandra"
    cassandra_tls_enabled:
      default: "0"
      value: "0"
    cassandra_datacenter_size:
      default: "1"
      value: "1"
    cassandra_storage_class:
      default: ""
      value: ""
    cassandra_storage_size:
      default: "8Gi"
      value: "8Gi"
    cassandra_heap_size:
      default: "512M"
      value: "512M"
    cassandra_prometheus_enabled:
      default: "0"
      value: "0"
    gateway_cassandra_enabled:
      default: "1"
      value: "1"

    # Postgres Settings
    postgres_enabled:
      default: "0"
      value: "0"
    postgres_external:
      default: "0"
      value: "0"
    postgres_user:
      default: "postgres"
      value: "postgres"
    postgres_password:
      default: "postgres"
      value: "postgres"
    postgres_db:
      default: "postgres"
      value: "postgres"
    postgres_db_owner:
      default: "postgres"
      value: "postgres"
    postgres_instances:
      default: "1"
      value: "1"
    postgres_storage_size:
      default: "10Gi"
      value: "10Gi"
    postgres_storage_class:
      default: ""
      value: ""
    postgres_log_level:
      default: "info"
      value: "info"
    postgres_external_host:
      default: ""
      value: ""
    postgres_external_port:
      default: "5432"
      value: "5432"
    postgres_external_database:
      default: "postgres"
      value: "postgres"
    gateway_postgres_enabled:
      default: "1"
      value: "1"

    # NFS Server Settings
    nfs_enabled:
      default: "0"
      value: "0"
    nfs_share:
      default: "/shared"
      value: "/shared"
    nfs_share_options:
      default: "*(rw,insecure,no_subtree_check,all_squash)"
      value: "*(rw,insecure,no_subtree_check,all_squash)"

    # Garage S3 Storage Settings
    garage_enabled:
      default: "0"
      value: "0"
    garage_bucket:
      default: "storagebox"
      value: "storagebox"
    garage_meta_size:
      default: "1Gi"
      value: "1Gi"
    garage_data_size:
      default: "50Gi"
      value: "50Gi"
    garage_meta_storage_class:
      default: ""
      value: ""
    garage_data_storage_class:
      default: ""
      value: ""
    gateway_garage_enabled:
      default: "1"
      value: "1"
    gateway_garage_hostname:
      default: "garage.local"
      value: "garage.local"
    gateway_garage_tls_enabled:
      default: "0"
      value: "0"
    gateway_garage_tls_secret_name:
      default: ""
      value: ""

    # rqlite Settings
    rqlite_enabled:
      default: "0"
      value: "0"
    rqlite_replicas:
      default: "1"
      value: "1"
    rqlite_storage_size:
      default: "10Gi"
      value: "10Gi"
    rqlite_storage_class:
      default: ""
      value: ""
    rqlite_image_tag:
      default: "null"
      value: "null"
    rqlite_image_pull_policy:
      default: "null"
      value: "null"
    gateway_rqlite_enabled:
      default: "1"
      value: "1"
    gateway_rqlite_hostname:
      default: "rqlite.local"
      value: "rqlite.local"
    gateway_rqlite_tls_enabled:
      default: "0"
      value: "0"
    gateway_rqlite_tls_secret_name:
      default: ""
      value: ""
