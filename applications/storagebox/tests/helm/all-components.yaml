# Test values for Storagebox CI pipeline
# Enables all 5 storage components with minimal resources for single-node testing.
# No Replicated license or cert-manager ClusterIssuer needed
# (cert-manager is installed as an operator, not via the chart).
#
# Gateway API is disabled: the CI cluster does not have Envoy Gateway or
# Gateway API CRDs installed. Gateway routing is tested via EC deployments.
#
# NOTE: This file is for CI/Helm testing only and is NOT part of the Four-Way Contract.
# It does not replace development-values.yaml (KOTS ConfigValues).
# For KOTS deployments, see: development-values.yaml

replicated:
  enabled: false

certmanager:
  selfSignedClusterIssuer:
    enabled: false

# Disable Gateway API (no Envoy Gateway on CI clusters)
gateway:
  enabled: false

# --- Cassandra via K8ssandra operator ---
cassandra:
  enabled: true
  mode: simple
  clusterName: storagebox-cassandra
  serverVersion: "4.1.6"
  auth:
    username: cassandra
    password: cassandra
  datacenters:
    - name: dc1
      size: 1
      storageConfig:
        storageClassName: ""
        size: 2Gi
      resources: {}
      config:
        cassandraYaml:
          num_tokens: 256
          authenticator: PasswordAuthenticator
          authorizer: CassandraAuthorizer
        jvmOptions:
          heapSize: 256M
  tls:
    enabled: false
  telemetry:
    prometheus:
      enabled: false

# --- PostgreSQL via CloudnativePG operator ---
postgres:
  auth:
    username: postgres
    password: postgres
  embedded:
    enabled: true
    instances: 1
    image:
      repository: ghcr.io/cloudnative-pg/postgresql
      tag: '15.2'
    imagePullPolicy: IfNotPresent
    initdb:
      database: postgres
      owner: postgres
      secret:
        name: 'postgres-initdb-secret'
    postgresUID: 26
    postgresGID: 26
    service:
      enabled: true
      type: ClusterIP
    storage:
      size: 2Gi
      storageClass: ''
    resources: {}
    # Empty affinity to work on single-node clusters
    affinity: {}
    primaryUpdateMethod: switchover
    primaryUpdateStrategy: unsupervised
    logLevel: 'info'
    enableSuperuserAccess: true
  external:
    enabled: false

# --- Garage S3-compatible object storage ---
garage:
  enabled: true
  bucket: storagebox
  persistence:
    meta:
      size: 1Gi
    data:
      size: 2Gi

# --- NFS Server ---
# Disabled in CI: requires host kernel nfs/nfsd modules (modprobe nfs)
# which are not available on CMX VMs or standard CI runners.
nfs-server:
  enabled: false

# --- rqlite ---
rqlite:
  enabled: true
