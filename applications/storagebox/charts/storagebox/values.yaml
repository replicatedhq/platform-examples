global:
  imagePullSecrets: []

images:
  alpine:
    repository: alpine
    tag: "3.21"
  garageSetup:
    repository: alpine
    tag: "3.21"

replicated:
  enabled: true

nfs-server:
  enabled: false
  securityContext:
    privileged: true
    capabilities:
      add:
        - SYS_ADMIN
        - SYS_MODULE
  env:
    NFS_EXPORT_0: /shared *(rw,sync,no_subtree_check,no_root_squash)
  service:
    main:
      enabled: true
      primary: true
      type: NodePort
      externalTrafficPolicy: Local
      ports:
        http:
          enabled: false
        nfs-111:
          enabled: true
          port: 111
          nodePort: 111
          protocol: TCP
        nfsd:
          enabled: true
          primary: true
          port: 2049
          nodePort: 2049
          protocol: TCP
        nfs-32765:
          enabled: true
          port: 32765
          nodePort: 32765
          protocol: TCP
        nfs-32767:
          enabled: true
          port: 32767
          nodePort: 32767
          protocol: TCP
        nfs-111-udp:
          enabled: true
          port: 111
          nodePort: 111
          protocol: UDP
        nfsd-udp:
          enabled: true
          port: 2049
          nodePort: 2049
          protocol: UDP
        nfs-32765-udp:
          enabled: true
          port: 32765
          nodePort: 32765
          protocol: UDP
        nfs-32767-udp:
          enabled: true
          port: 32767
          nodePort: 32767
          protocol: UDP
    udp:
      enabled: false
  persistence:
    shared:
      enabled: true
      type: emptyDir
      mountPath: /shared

# Cassandra configuration via K8ssandra operator
# Deploys a K8ssandraCluster CR managed by the k8ssandra-operator
cassandra:
  enabled: true
  mode: simple
  clusterName: storagebox-cassandra
  serverVersion: "4.1.6"
  auth:
    username: cassandra
    password: cassandra
  datacenters:
    - name: dc1
      size: 1
      storageConfig:
        storageClassName: ""
        size: 8Gi
      resources: {}
      config:
        cassandraYaml:
          num_tokens: 256
          authenticator: PasswordAuthenticator
          authorizer: CassandraAuthorizer
        jvmOptions:
          heapSize: 512M
  tls:
    enabled: false
  service:
    type: ClusterIP
    cqlPort: 9042
  reaper:
    enabled: false
    keyspace: reaper_db
  medusa:
    enabled: false
  telemetry:
    prometheus:
      enabled: false

# Embedded Postgres configuration via CloudnativePG Operator
postgres:
  auth:
    username: postgres
    password: postgres
  embedded:
    enabled: true
    annotations: {}
    additionalLabels: {}
    instances: 1
    image:
      repository: ghcr.io/cloudnative-pg/postgresql
      tag: '15.2'
    imagePullPolicy: IfNotPresent
    imagePullSecrets: []
    initdb:
      database: postgres
      owner: postgres
      secret:
        name: 'postgres-initdb-secret'
      postInitApplicationSQL: []
    postgresUID: 26
    postgresGID: 26
    service:
      enabled: true
      type: ClusterIP
    storage:
      size: 10Gi
      storageClass: ''
    resources: {}
    priorityClassName: ''
    primaryUpdateMethod: switchover
    primaryUpdateStrategy: unsupervised
    logLevel: 'info'
    affinity:
      topologyKey: topology.kubernetes.io/zone
    certificates: {}
    enableSuperuserAccess: true
    superuserSecret: ''
    roles: []
    postgresql: {}
  external:
    enabled: false
    host: ''
    port: 5432
    database: pdns

# Garage S3-compatible object storage (vendored subchart)
# Lightweight alternative to MinIO - single-binary, no operator required.
# A post-install Job creates a bucket and S3 credentials automatically.
garage:
  enabled: true
  bucket: storagebox
  persistence:
    meta:
      size: 1Gi
      storageClass: ""
    data:
      size: 50Gi
      storageClass: ""

certmanager:
  selfSignedClusterIssuer:
    enabled: true

# Gateway API configuration (requires Envoy Gateway as EC extension)
# Each enabled application gets its own Gateway + Envoy proxy instance.
# NFS is excluded: Gateway API does not support UDP, which NFS requires.
gateway:
  enabled: true
  className: ""
  serviceType: NodePort
  replicas: 1
  annotations: {}
  garage:
    enabled: true
    hostname: garage.local
    tls:
      enabled: false
      secretName: ""
  postgres:
    enabled: true
  cassandra:
    enabled: true
  rqlite:
    enabled: true
    hostname: rqlite.local
    tls:
      enabled: false
      secretName: ""

rqlite:
  enabled: false
