---
apiVersion: kots.io/v1beta1
kind: Config
metadata:
  name: config
spec:
  groups:
  # cassandra settings (K8ssandra operator)
  - name: cassandra_settings
    title: Cassandra Settings
    items:
    - name: cassandra_enabled
      title: Enable Cassandra
      type: bool
      default: false
      required: true
      description: Enable Cassandra via K8ssandra operator
    - name: cassandra_mode
      title: Cassandra Deployment Mode
      type: select_one
      items:
      - name: simple
        title: Simple (Cassandra only)
      - name: full
        title: Full (Cassandra + Reaper repairs)
      default: simple
      when: 'repl{{ ConfigOptionEquals "cassandra_enabled" "1" }}'
    - name: cassandra_user
      title: Cassandra Superuser
      type: text
      default: cassandra
      required: true
      description: The superuser username for Cassandra
    - name: cassandra_password
      title: Cassandra Password
      type: password
      default: cassandra
      required: true
      description: The superuser password for Cassandra
      secret: true
    # TLS support is not yet implemented - hidden from UI to prevent render failures
    # Re-enable when cassandra-cluster.yaml TLS templating is complete
    - name: cassandra_tls_enabled
      title: Enable TLS
      type: bool
      default: false
      description: Enable TLS encryption via cert-manager (not yet implemented)
      when: 'false'
    - name: cassandra_datacenter_size
      title: Datacenter Replica Count
      type: text
      default: "1"
      required: true
      description: Number of Cassandra nodes in the datacenter
      when: 'repl{{ ConfigOptionEquals "cassandra_enabled" "1" }}'
      validation:
        regex:
          pattern: ^\d+$
          message: Must be a whole number.
    - name: cassandra_storage_class
      title: Storage Class
      type: text
      default: ""
      description: Kubernetes storage class for Cassandra data volumes. Leave empty for the cluster default.
      when: 'repl{{ ConfigOptionEquals "cassandra_enabled" "1" }}'
    - name: cassandra_storage_size
      title: Data Volume Size
      type: text
      default: 8Gi
      required: true
      description: Size of the persistent volume for each Cassandra node
      when: 'repl{{ ConfigOptionEquals "cassandra_enabled" "1" }}'
    - name: cassandra_heap_size
      title: JVM Heap Size
      type: text
      default: 512M
      required: true
      description: JVM heap size for Cassandra (e.g. 512M, 1G, 2G)
      when: 'repl{{ ConfigOptionEquals "cassandra_enabled" "1" }}'
    - name: cassandra_prometheus_enabled
      title: Enable Prometheus Metrics
      type: bool
      default: false
      description: Expose Prometheus metrics endpoint for Cassandra
      when: 'repl{{ ConfigOptionEquals "cassandra_enabled" "1" }}'
  # Postgres settings
  - name: postgres_settings
    title: Postgres database settings
    items:
    - name: postgres_enabled
      title: Enable Postgres
      type: bool
      default: false
      required: true
      description: Enable Postgres
    - name: postgres_external
      title: Use External PostgreSQL
      type: bool
      default: false
      description: Connect to an external PostgreSQL server instead of deploying an embedded instance
      when: 'repl{{ ConfigOptionEquals "postgres_enabled" "1" }}'
    - name: postgres_user
      title: Postgres User
      type: text
      default: postgres
      required: true
      description: The username for the Postgres user
    - name: postgres_password
      title: Postgres Password
      type: password
      default: postgres
      required: true
      description: Postgres user password
      secret: true
    - name: postgres_db
      title: Postgres Database Name
      type: text
      default: postgres
      required: true
      description: The name of the Postgres database
    - name: postgres_db_owner
      title: Postgres Database Owner
      type: text
      default: postgres
      required: true
      description: The name of the Postgres database owner
      when: 'repl{{ and (ConfigOptionEquals "postgres_enabled" "1") (ConfigOptionNotEquals "postgres_external" "1") }}'
    - name: postgres_instances
      title: Number of Instances
      type: text
      default: "1"
      required: true
      description: Number of PostgreSQL instances (use odd numbers for HA)
      when: 'repl{{ and (ConfigOptionEquals "postgres_enabled" "1") (ConfigOptionNotEquals "postgres_external" "1") }}'
      validation:
        regex:
          pattern: ^\d+$
          message: Must be a whole number.
    - name: postgres_storage_size
      title: Storage Size
      type: text
      default: 10Gi
      required: true
      description: Size of the persistent volume for each PostgreSQL instance
      when: 'repl{{ and (ConfigOptionEquals "postgres_enabled" "1") (ConfigOptionNotEquals "postgres_external" "1") }}'
    - name: postgres_storage_class
      title: Storage Class
      type: text
      default: ""
      description: Kubernetes storage class for PostgreSQL volumes. Leave empty for the cluster default.
      when: 'repl{{ and (ConfigOptionEquals "postgres_enabled" "1") (ConfigOptionNotEquals "postgres_external" "1") }}'
    - name: postgres_log_level
      title: Log Level
      type: select_one
      items:
      - name: error
        title: Error
      - name: warning
        title: Warning
      - name: info
        title: Info
      - name: debug
        title: Debug
      - name: trace
        title: Trace
      default: info
      description: PostgreSQL logging verbosity
      when: 'repl{{ and (ConfigOptionEquals "postgres_enabled" "1") (ConfigOptionNotEquals "postgres_external" "1") }}'
    - name: postgres_external_host
      title: External Host
      type: text
      default: ""
      required: true
      description: Hostname or IP of the external PostgreSQL server
      when: 'repl{{ and (ConfigOptionEquals "postgres_enabled" "1") (ConfigOptionEquals "postgres_external" "1") }}'
    - name: postgres_external_port
      title: External Port
      type: text
      default: "5432"
      required: true
      description: Port of the external PostgreSQL server
      when: 'repl{{ and (ConfigOptionEquals "postgres_enabled" "1") (ConfigOptionEquals "postgres_external" "1") }}'
    - name: postgres_external_database
      title: External Database Name
      type: text
      default: postgres
      required: true
      description: Database name on the external PostgreSQL server
      when: 'repl{{ and (ConfigOptionEquals "postgres_enabled" "1") (ConfigOptionEquals "postgres_external" "1") }}'
  # NFS Server settings
  - name: nfs_settings
    title: NFS Server settings
    items:
    - name: nfs_enabled
      title: Enable NFS Server
      type: bool
      default: false
      required: true
      description: Enable NFS Server
    - name: nfs_share
      title: NFS Share
      type: text
      default: /shared
      required: true
      description: The NFS share to mount
    - name: nfs_share_options
      title: NFS Share Options
      type: text
      default: '*(rw,insecure,no_subtree_check,all_squash)'
      required: true
      description: The NFS share options
  # MinIO Tenant settings
  - name: minio_settings
    title: MinIO Tenant settings
    items:
    - name: minio_tenant_enabled
      title: Enable MinIO Tenant
      type: bool
      default: false
      required: true
      description: Enable MinIO Tenant
    - name: minio_tenant_name
      title: MinIO Tenant Name
      type: text
      default: minio
      required: true
      description: The name of the MinIO Tenant
    - name: minio_tenant_configuration_access_key
      title: MinIO Tenant Configuration Access Key
      type: password
      default: minio
      required: true
      description: The access key for the MinIO Tenant Configuration
    - name: minio_tenant_configuration_secret_key
      title: MinIO Tenant Configuration Secret Key
      type: password
      default: minio123
      required: true
      description: The secret key for the MinIO Tenant Configuration
      secret: true
    - name: minio_tenant_pool_name
      title: MinIO Tenant Pool Name
      type: text
      default: pool-0
      required: true
      description: The name of the MinIO Tenant Pool
    - name: minio_tenant_pool_servers
      title: MinIO Tenant Pool Servers
      type: text
      default: '1'
      required: true
      description: The number of MinIO Tenant Pool Servers
    - name: minio_tenant_pool_volumes_per_server
      title: MinIO Tenant Pool Volumes Per Server
      type: text
      default: '1'
      required: true
      description: The number of MinIO Tenant Pool Volumes Per Server
    - name: minio_tenant_pool_size
      title: MinIO Tenant Pool Size
      type: text
      default: 10Gi
      required: true
      description: The size of the MinIO Tenant Pool
    - name: minio_tenant_pool_storage_class_name
      title: MinIO Tenant Pool Storage Class Name
      type: text
      default: ''
      description: The storage class name for the MinIO Tenant Pool
    - name: minio_tenant_tls_auto_cert
      title: Enable Auto TLS
      type: bool
      default: true
      description: Enable automatic TLS certificate generation for MinIO
      when: 'repl{{ ConfigOptionEquals "minio_tenant_enabled" "1" }}'
    - name: minio_tenant_ingress_api_host
      title: API Ingress Hostname
      type: text
      default: minio.local
      description: Hostname for the MinIO S3 API ingress
      when: 'repl{{ ConfigOptionEquals "minio_tenant_enabled" "1" }}'
    - name: minio_tenant_ingress_console_host
      title: Console Ingress Hostname
      type: text
      default: minio-console.local
      description: Hostname for the MinIO Console ingress
      when: 'repl{{ ConfigOptionEquals "minio_tenant_enabled" "1" }}'
    - name: minio_tenant_metrics_enabled
      title: MinIO Tenant Metrics Enabled
      type: bool
      default: true
      description: Enable MinIO Tenant Metrics
      required: true
    - name: minio_tenant_metrics_port
      title: MinIO Tenant Metrics Port
      type: text
      default: '9000'
      description: The port for MinIO Tenant Metrics
      required: true
    - name: minio_tenant_metrics_protocol
      title: MinIO Tenant Metrics Protocol
      type: text
      default: http
      description: The protocol for MinIO Tenant Metrics
      required: true
    - name: minio_tenant_bucket_name
      title: MinIO Tenant Bucket Name
      type: text
      default: minio
      required: true
      description: The name of the MinIO Tenant Bucket
    - name: minio_tenant_bucket_object_lock
      title: MinIO Tenant Bucket Object Lock
      type: bool
      default: false
      description: Enable MinIO Tenant Bucket Object Lock
    - name: minio_tenant_bucket_region
      title: MinIO Tenant Bucket Region
      type: text
      default: us-east-1
      description: The region for the MinIO Tenant Bucket
      required: true
  # rqlite settings
  - name: rqlite
    title: rqlite (relational Sqlite) chart settings
    items:
    - name: rqlite_enabled
      type: bool
      required: true
      default: false
      help_text: Enable rqlite
    - name: rqlite_replicas
      when: repl{{ (ConfigOptionEquals "rqlite_enabled" "1")}}
      type: text
      help_text: Replicas
      default: "1"
      validation:
        regex:
          pattern: ^\d+$
          message: Replicas must be a whole number greater than or equal to 0.
    - name: rqlite_storage_size
      title: Data Volume Size
      type: text
      default: 10Gi
      required: true
      description: Size of the persistent volume for each rqlite node
      when: repl{{ (ConfigOptionEquals "rqlite_enabled" "1")}}
    - name: rqlite_storage_class
      title: Storage Class
      type: text
      default: ""
      description: Kubernetes storage class for rqlite volumes. Leave empty for the cluster default.
      when: repl{{ (ConfigOptionEquals "rqlite_enabled" "1")}}
    - name: rqlite_image_tag
      when: repl{{ (ConfigOptionEquals "rqlite_enabled" "1")}}
      type: text
      # When undefined ("null"), the Chart defaults the pod spec tag to "appVersion" defined in Chart.yaml
      help_text: Tag. Leave "null" to use the Chart's "appVersion" as tag
      default: "null"
      validation:
        regex:
          pattern: "[a-zA-Z0-9_][a-zA-Z0-9._-]{0,127}"
          message: Must be 1–128 characters. The first character must be a letter, digit, or underscore (_); the remaining characters may be letters, digits, underscores (_), periods (.), or dashes (-). See https://kubernetes.io/docs/concepts/containers/images/#image-names
    - name: rqlite_image_pull_policy
      when: repl{{ (ConfigOptionEquals "rqlite_enabled" "1")}}
      type: text
      # When undefined ("null"), the Chart omits this field from pod specs, so k8s default image pull policy is used
      # See https://kubernetes.io/docs/concepts/containers/images/#imagepullpolicy-defaulting
      help_text: Tag. Leave "null" to use k8s default image pull policy. See https://kubernetes.io/docs/concepts/containers/images/#imagepullpolicy-defaulting
      default: "null"
      validation:
        regex:
          pattern: ^(IfNotPresent|Always|Never|null)$
          message: "Value must be one of: IfNotPresent, Always, Never, or null."
