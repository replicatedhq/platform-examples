apiVersion: kots.io/v1beta2
kind: HelmChart
metadata:
  name: storagebox
spec:
  chart:
    name: storagebox
    chartVersion: 0.26.8
  helmUpgradeFlags:
    - --timeout
    - 10m0s
  builder:
    # Static values for air-gap image discovery. The Vendor Portal runs
    # helm template with these values to find every container image.
    # All components must be enabled so their templates render.
    images:
      alpine:
        repository: docker.io/library/alpine
        tag: "3.21"
    garage:
      enabled: true
      bucket: storagebox
      image:
        repository: docker.io/dxflrs/garage
      persistence:
        meta:
          size: 1Gi
        data:
          size: 50Gi
    cassandra:
      enabled: true
      clusterName: storagebox-cassandra
      serverVersion: "4.1.6"
      auth:
        username: builder
        password: builder
      datacenters:
        - name: dc1
          size: 1
          storageConfig:
            size: 8Gi
          config:
            cassandraYaml:
              num_tokens: 256
              authenticator: PasswordAuthenticator
              authorizer: CassandraAuthorizer
            jvmOptions:
              heapSize: 512M
      tls:
        enabled: false
    postgres:
      enabled: true
      auth:
        username: builder
        password: builder
      embedded:
        enabled: true
        image:
          repository: ghcr.io/cloudnative-pg/postgresql
          tag: "15.2"
        instances: 1
        initdb:
          database: postgres
          owner: postgres
          secret:
            name: postgres-initdb-secret
        postgresUID: 26
        postgresGID: 26
        storage:
          size: 10Gi
        service:
          enabled: true
          type: ClusterIP
        primaryUpdateMethod: switchover
        primaryUpdateStrategy: unsupervised
        logLevel: info
        enableSuperuserAccess: true
    nfs-server:
      enabled: true
      env:
        NFS_EXPORT_0: /shared *(rw,sync,no_subtree_check,no_root_squash)
    rqlite:
      enabled: true
      replicas: 1
      image:
        repository: docker.io/rqlite/rqlite
      persistence:
        size: 10Gi
    gateway:
      enabled: true
      garage:
        enabled: true
        hostname: garage.local
      postgres:
        enabled: true
      cassandra:
        enabled: true
      rqlite:
        enabled: true
        hostname: rqlite.local
  values:
    global:
      imagePullSecrets:
        - name: repl{{ ImagePullSecretName }}
    images:
      alpine:
        repository: repl{{ HasLocalRegistry | ternary (print LocalRegistryHost "/library/alpine") "proxy.xyyzx.net/proxy/storagebox/docker.io/library/alpine" }}
        tag: "3.21"
    replicated:
      enabled: true
    gateway:
      enabled: repl{{ ConfigOptionEquals "gateway_enabled" "1" }}
      garage:
        enabled: repl{{ ConfigOptionEquals "gateway_garage_enabled" "1" }}
        hostname: repl{{ ConfigOption "gateway_garage_hostname" }}
        tls:
          enabled: repl{{ ConfigOptionEquals "gateway_garage_tls_enabled" "1" }}
          secretName: repl{{ ConfigOption "gateway_garage_tls_secret_name" }}
      postgres:
        enabled: repl{{ ConfigOptionEquals "gateway_postgres_enabled" "1" }}
      cassandra:
        enabled: repl{{ ConfigOptionEquals "gateway_cassandra_enabled" "1" }}
      rqlite:
        enabled: repl{{ ConfigOptionEquals "gateway_rqlite_enabled" "1" }}
        hostname: repl{{ ConfigOption "gateway_rqlite_hostname" }}
        tls:
          enabled: repl{{ ConfigOptionEquals "gateway_rqlite_tls_enabled" "1" }}
          secretName: repl{{ ConfigOption "gateway_rqlite_tls_secret_name" }}
    nfs-server:
      enabled: repl{{ ConfigOptionEquals "nfs_enabled" "1" }}
      imagePullSecrets:
        - name: repl{{ ImagePullSecretName }}
      persistence:
        shared:
          enabled: true
          type: emptyDir
          mountPath: repl{{ ConfigOption "nfs_share" }}
      env:
        NFS_EXPORT_0: repl{{ ConfigOption "nfs_share" }} repl{{ ConfigOption "nfs_share_options" }}
        NFS_LOG_LEVEL: debug
    cassandra:
      enabled: repl{{ ConfigOptionEquals "cassandra_enabled" "1" }}
      mode: repl{{ ConfigOption "cassandra_mode" }}
      auth:
        username: repl{{ ConfigOption "cassandra_user" }}
        password: repl{{ ConfigOption "cassandra_password" }}
      tls:
        enabled: repl{{ ConfigOptionEquals "cassandra_tls_enabled" "1" }}
      datacenters:
        - name: dc1
          size: repl{{ ConfigOption "cassandra_datacenter_size" }}
          storageConfig:
            storageClassName: repl{{ ConfigOption "cassandra_storage_class" }}
            size: repl{{ ConfigOption "cassandra_storage_size" }}
          resources: {}
          config:
            cassandraYaml:
              num_tokens: 256
              authenticator: PasswordAuthenticator
              authorizer: CassandraAuthorizer
            jvmOptions:
              heapSize: repl{{ ConfigOption "cassandra_heap_size" }}
      telemetry:
        prometheus:
          enabled: repl{{ ConfigOptionEquals "cassandra_prometheus_enabled" "1" }}
    postgres:
      enabled: repl{{ ConfigOptionEquals "postgres_enabled" "1" }}
      auth:
        username: repl{{ ConfigOption "postgres_user" }}
        password: repl{{ ConfigOption "postgres_password" }}
      embedded:
        image:
          repository: repl{{ HasLocalRegistry | ternary (print LocalRegistryHost "/cloudnative-pg/postgresql") "proxy.xyyzx.net/proxy/storagebox/ghcr.io/cloudnative-pg/postgresql" }}
        imagePullSecrets:
          - name: repl{{ ImagePullSecretName }}
        enabled: 'repl{{ ConfigOptionNotEquals "postgres_external" "1" }}'
        instances: repl{{ ConfigOption "postgres_instances" }}
        initdb:
          database: repl{{ ConfigOption "postgres_db" }}
          owner: repl{{ ConfigOption "postgres_db_owner" }}
        storage:
          size: repl{{ ConfigOption "postgres_storage_size" }}
          storageClass: repl{{ ConfigOption "postgres_storage_class" }}
        logLevel: repl{{ ConfigOption "postgres_log_level" }}
        service:
          type: NodePort
      external:
        enabled: repl{{ ConfigOptionEquals "postgres_external" "1" }}
        host: repl{{ ConfigOption "postgres_external_host" }}
        port: repl{{ ConfigOption "postgres_external_port" }}
        database: repl{{ ConfigOption "postgres_external_database" }}
    garage:
      enabled: repl{{ ConfigOptionEquals "garage_enabled" "1" }}
      bucket: repl{{ ConfigOption "garage_bucket" }}
      image:
        repository: repl{{ HasLocalRegistry | ternary (print LocalRegistryHost "/dxflrs/garage") "proxy.xyyzx.net/proxy/storagebox/docker.io/dxflrs/garage" }}
      initImage:
        repository: repl{{ HasLocalRegistry | ternary (print LocalRegistryHost "/library/alpine") "proxy.xyyzx.net/proxy/storagebox/docker.io/library/alpine" }}
        tag: "3.21"
      imagePullSecrets:
        - name: repl{{ ImagePullSecretName }}
      persistence:
        meta:
          size: repl{{ ConfigOption "garage_meta_size" }}
          storageClass: repl{{ ConfigOption "garage_meta_storage_class" }}
        data:
          size: repl{{ ConfigOption "garage_data_size" }}
          storageClass: repl{{ ConfigOption "garage_data_storage_class" }}
    rqlite:
      enabled: repl{{ ConfigOptionEquals "rqlite_enabled" "1" }}
      replicas: repl{{ ConfigOption "rqlite_replicas" }}
      image:
        repository: repl{{ HasLocalRegistry | ternary (print LocalRegistryHost "/rqlite/rqlite") "proxy.xyyzx.net/proxy/storagebox/docker.io/rqlite/rqlite" }}
        tag: repl{{ ConfigOption "rqlite_image_tag" }}
        pullPolicy: repl{{ ConfigOption "rqlite_image_pull_policy" }}
        pullSecrets:
          - name: repl{{ ImagePullSecretName }}
      persistence:
        size: repl{{ ConfigOption "rqlite_storage_size" }}
        storageClassName: repl{{ ConfigOption "rqlite_storage_class" }}

  optionalValues:
    - when: 'repl{{ ConfigOptionEquals "cassandra_mode" "full" }}'
      recursiveMerge: true
      values:
        cassandra:
          reaper:
            enabled: true
    # When PostgreSQL gateway is active, switch to ClusterIP (the gateway
    # handles external access via TCPRoute instead of NodePort).
    - when: 'repl{{ and (ConfigOptionEquals "gateway_enabled" "1") (ConfigOptionEquals "gateway_postgres_enabled" "1") (ConfigOptionEquals "postgres_enabled" "1") (ConfigOptionNotEquals "postgres_external" "1") }}'
      recursiveMerge: true
      values:
        postgres:
          embedded:
            service:
              type: ClusterIP
