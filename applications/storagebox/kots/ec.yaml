apiVersion: embeddedcluster.replicated.com/v1beta1
kind: Config
spec:
  version: 2.13.4+k8s-1.33
  domains:
    replicatedAppDomain: app.xyyzx.net
    proxyRegistryDomain: proxy.xyyzx.net
  extensions:
    helm:
      repositories:
        - name: cnpg
          url: https://cloudnative-pg.github.io/charts
        - name: jetstack
          url: https://charts.jetstack.io
        - name: k8ssandra
          url: https://helm.k8ssandra.io/stable
      # NOTE: cert-manager MUST be first - k8ssandra cass-operator
      # webhooks require cert-manager CRDs to exist at install time.
      charts:
        - name: cert-manager
          chartname: jetstack/cert-manager
          namespace: cert-manager
          version: "v1.19.1"
          values: |
            crds:
              enabled: true
            prometheus:
              enabled: false
        - name: cloudnative-pg
          chartname: cnpg/cloudnative-pg
          namespace: cnpg
          version: "0.27.0"
          values: |
            cloudnative-pg:
              enabled: true
        - name: envoy-gateway
          chartname: oci://docker.io/envoyproxy/gateway-helm
          namespace: envoy-gateway-system
          version: "v1.7.0"
        - name: k8ssandra-operator
          chartname: k8ssandra/k8ssandra-operator
          namespace: k8ssandra-operator
          version: "1.22.0"
          values: |
            global:
              clusterScoped: true
