apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "license-validation.fullname" . }}
  labels:
    {{- include "license-validation.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "license-validation.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "license-validation.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: license-validation
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: REPLICATED_SDK_ADDRESS
              value: {{ include "license-validation.sdkAddress" . | quote }}
            - name: SIMULATED_SEAT_USAGE
              value: {{ .Values.simulatedSeatUsage | quote }}
            {{- if .Values.appPublicKey }}
            - name: REPLICATED_APP_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "license-validation.fullname" . }}-public-key
                  key: public-key
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
