apiVersion: troubleshoot.sh/v1beta2
kind: Preflight
metadata:
  name: gitlab
spec:
  collectors:
    - clusterInfo: {}
    - clusterResources: {}
  analyzers:
    - clusterVersion:
        outcomes:
          - fail:
              when: "< 1.26.0"
              message: GitLab requires Kubernetes 1.26.0 or later.
              uri: https://www.kubernetes.io
          - warn:
              when: "< 1.30.0"
              message: Your cluster meets the minimum version of Kubernetes, but we recommend 1.30.0 or later.
              uri: https://kubernetes.io
          - pass:
              message: Your cluster meets the recommended and required versions of Kubernetes.

    - nodeResources:
        checkName: Total CPU Cores (minimum 4 for evaluation)
        outcomes:
          - fail:
              when: "sum(cpuCapacity) < 4"
              message: GitLab requires at least 4 CPU cores for evaluation. Production deployments need 8+ cores.
          - warn:
              when: "sum(cpuCapacity) < 8"
              message: GitLab is running with fewer than 8 CPU cores. This is acceptable for evaluation but not recommended for production.
          - pass:
              message: Cluster has sufficient CPU cores for GitLab.

    - nodeResources:
        checkName: Total Memory (minimum 12Gi for evaluation)
        outcomes:
          - fail:
              when: "sum(memoryCapacity) < 12Gi"
              message: GitLab requires at least 12Gi of RAM for evaluation. Production deployments need 30Gi+.
          - warn:
              when: "sum(memoryCapacity) < 30Gi"
              message: GitLab is running with less than 30Gi of RAM. This is acceptable for evaluation but not recommended for production.
          - pass:
              message: Cluster has sufficient memory for GitLab.

    - storageClass:
        checkName: Default storage class
        outcomes:
          - fail:
              message: No default storage class found. GitLab requires persistent storage for PostgreSQL, Redis, and object storage.
          - pass:
              message: Default storage class is available.
