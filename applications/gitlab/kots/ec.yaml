apiVersion: embeddedcluster.replicated.com/v1beta1
kind: Config
spec:
  version: 2.13.3+k8s-1.33
  extensions:
    helm:
      repositories:
        - name: ingress-nginx
          url: https://kubernetes.github.io/ingress-nginx
        - name: jetstack
          url: https://charts.jetstack.io
        - name: cnpg
          url: https://cloudnative-pg.github.io/charts
      charts:
        # NGINX Ingress — GitLab chart requires nginx ingress by default
        - name: ingress-nginx
          chartname: ingress-nginx/ingress-nginx
          namespace: ingress-nginx
          version: "4.14.1"
          values: |
            controller:
              service:
                type: NodePort
                nodePorts:
                  http: 80
                  https: 443

        # cert-manager — GitLab chart uses cert-manager for TLS
        - name: cert-manager
          chartname: jetstack/cert-manager
          namespace: cert-manager
          version: "v1.19.1"
          values: |
            crds:
              enabled: true
            prometheus:
              enabled: false

        # CloudNativePG — for external PostgreSQL option (production pattern)
        # Note: GitLab requires PostgreSQL 16+ with extensions: amcheck, pg_trgm, btree_gist
        - name: cloudnative-pg
          chartname: cnpg/cloudnative-pg
          namespace: cnpg
          version: "0.27.0"
