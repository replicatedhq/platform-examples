apiVersion: kots.io/v1beta1
kind: Config
metadata:
  name: config
spec:
  groups:

  # Domain & Access
  - name: domain_settings
    title: Domain Settings
    items:
    - name: gitlab_domain
      title: GitLab Domain
      type: text
      required: true
      description: The base domain for GitLab (e.g. gitlab.example.com). All subdomains (registry, minio, kas) are derived from this.
    - name: gitlab_edition
      title: GitLab Edition
      type: select_one
      default: ce
      required: true
      description: Community Edition (CE) is free and open source. Enterprise Edition (EE) requires a license.
      items:
      - name: ce
        title: Community Edition (CE)
      - name: ee
        title: Enterprise Edition (EE)

  # PostgreSQL settings
  - name: postgres_settings
    title: PostgreSQL Database
    description: "WARNING: Bundled PostgreSQL is for evaluation only and will be removed in GitLab 19.0. Use external PostgreSQL 16+ for production."
    items:
    - name: internal_postgres_enabled
      title: Use Bundled PostgreSQL (Eval Only)
      type: bool
      default: "1"
      required: true
      description: Deploy bundled PostgreSQL. Deprecated — will be removed in GitLab 19.0. For production, disable and provide external PostgreSQL 16+.
    - name: postgres_host
      title: External PostgreSQL Host
      type: text
      required: true
      description: Host for external PostgreSQL server (PostgreSQL 16+ required).
      when: 'repl{{ ConfigOptionEquals "internal_postgres_enabled" "0" }}'
    - name: postgres_port
      title: PostgreSQL Port
      type: text
      default: "5432"
      required: true
      when: 'repl{{ ConfigOptionEquals "internal_postgres_enabled" "0" }}'
    - name: postgres_db
      title: PostgreSQL Database Name
      type: text
      default: gitlabhq_production
      required: true
    - name: postgres_user
      title: PostgreSQL Username
      type: text
      default: gitlab
      required: true
    - name: postgres_password
      title: PostgreSQL Password
      type: password
      required: true
      secret: true

  # Redis settings
  - name: redis_settings
    title: Redis / Valkey Cache
    description: "WARNING: Bundled Redis is for evaluation only and will be removed in GitLab 19.0. Use external Redis or Valkey for production."
    items:
    - name: internal_redis_enabled
      title: Use Bundled Redis (Eval Only)
      type: bool
      default: "1"
      required: true
      description: Deploy bundled Redis. Deprecated — will be removed in GitLab 19.0. For production, disable and provide external Redis/Valkey.
    - name: redis_host
      title: External Redis Host
      type: text
      required: true
      when: 'repl{{ ConfigOptionEquals "internal_redis_enabled" "0" }}'
    - name: redis_password
      title: Redis Password
      type: password
      required: false
      secret: true
      when: 'repl{{ ConfigOptionEquals "internal_redis_enabled" "0" }}'

  # Object Storage
  - name: object_storage_settings
    title: Object Storage
    description: GitLab requires S3-compatible object storage for artifacts, LFS, packages, uploads, and more.
    items:
    - name: internal_minio_enabled
      title: Use Bundled MinIO (Eval Only)
      type: bool
      default: "1"
      required: true
      description: Deploy bundled MinIO for object storage. For production, use external S3-compatible storage.
    - name: object_store_connection_secret
      title: Object Storage Connection Secret Name
      type: text
      required: true
      when: 'repl{{ ConfigOptionEquals "internal_minio_enabled" "0" }}'
      description: Name of the Kubernetes secret containing the S3 connection configuration.

  # TLS / Ingress
  - name: ingress_settings
    title: Ingress & TLS
    items:
    - name: tls_enabled
      title: Enable TLS
      type: bool
      default: "1"
      description: Enable HTTPS via cert-manager. Requires a valid domain with DNS configured.
    - name: certmanager_issuer_email
      title: cert-manager ACME Email
      type: text
      required: false
      when: 'repl{{ ConfigOptionEquals "tls_enabled" "1" }}'
      description: Email address for Let's Encrypt certificate notifications.

  # SMTP (optional)
  - name: smtp_settings
    title: Email (SMTP)
    items:
    - name: smtp_enabled
      title: Enable SMTP
      type: bool
      default: "0"
    - name: smtp_host
      title: SMTP Host
      type: text
      when: 'repl{{ ConfigOptionEquals "smtp_enabled" "1" }}'
    - name: smtp_port
      title: SMTP Port
      type: text
      default: "587"
      when: 'repl{{ ConfigOptionEquals "smtp_enabled" "1" }}'
    - name: smtp_user
      title: SMTP Username
      type: text
      when: 'repl{{ ConfigOptionEquals "smtp_enabled" "1" }}'
    - name: smtp_password
      title: SMTP Password
      type: password
      secret: true
      when: 'repl{{ ConfigOptionEquals "smtp_enabled" "1" }}'
    - name: smtp_from
      title: Email From Address
      type: text
      default: gitlab@example.com
      when: 'repl{{ ConfigOptionEquals "smtp_enabled" "1" }}'
