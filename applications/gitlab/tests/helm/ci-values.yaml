# CI values for GitLab chart — minimal eval install for lint/template validation.
# WARNING: This configuration uses bundled dependencies (PostgreSQL, Redis, MinIO)
# which are deprecated and will be removed in GitLab 19.0. Use for evaluation only.

gitlab:
  enabled: true

  global:
    hosts:
      domain: gitlab.example.com
      externalIP: 10.0.0.1

    edition: ce

    ingress:
      configureCertmanager: false
      class: nginx
      tls:
        enabled: false

    # Use bundled services for CI (eval only)
    psql:
      host: ""
    redis:
      host: ""

  # Bundled services (eval/CI only)
  postgresql:
    install: true
  redis:
    install: true
  minio:
    enabled: true
  nginx-ingress:
    enabled: true
  certmanager:
    install: false
  prometheus:
    install: false
  registry:
    enabled: true
  gitlab-runner:
    install: false

  # Reduce resource requirements for CI
  gitlab:
    webservice:
      replicaCount: 1
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
    sidekiq:
      replicaCount: 1
      resources:
        requests:
          cpu: 50m
          memory: 300Mi

replicated:
  enabled: true
