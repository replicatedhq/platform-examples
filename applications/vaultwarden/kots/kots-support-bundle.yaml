kind: SupportBundle
apiVersion: troubleshoot.sh/v1beta2
metadata:
  name: vaultwarden
spec:
  collectors:
    - clusterInfo: {}
    - clusterResources: {}
    - logs:
        selector:
          - app.kubernetes.io/name=vaultwarden
        limits:
          maxLines: 10000
  analyzers:
    - clusterVersion:
        outcomes:
          - fail:
              when: "< 1.26.0"
              message: Vaultwarden requires Kubernetes 1.26.0 or later.
              uri: https://www.kubernetes.io
          - warn:
              when: "< 1.29.0"
              message: Your cluster meets the minimum version of Kubernetes, but we recommend 1.29.0 or later.
              uri: https://kubernetes.io
          - pass:
              message: Your cluster meets the recommended and required versions of Kubernetes.
    - nodeResources:
        checkName: Total CPU Cores in the cluster is 2 or greater
        outcomes:
          - fail:
              when: "sum(cpuCapacity) < 2"
              message: The cluster must contain at least 2 CPU cores.
          - pass:
              message: There are at least 2 CPU cores in the cluster.
    - nodeResources:
        checkName: Total memory in the cluster is 4Gi or greater
        outcomes:
          - fail:
              when: "sum(memoryCapacity) < 4Gi"
              message: The cluster must have at least 4Gi of memory.
          - pass:
              message: There is at least 4Gi of memory in the cluster.
    - storageClass:
        checkName: Check for default storage class
        outcomes:
          - fail:
              message: No default storage class found.
          - pass:
              message: Default storage class found.
    - deploymentStatus:
        name: vaultwarden
        outcomes:
          - fail:
              when: "< 1"
              message: The Vaultwarden deployment does not have any ready replicas.
          - pass:
              message: The Vaultwarden deployment has ready replicas.
