apiVersion: kots.io/v1beta1
kind: Application
metadata:
  name: vaultwarden
spec:
  title: Vaultwarden
  icon: https://raw.githubusercontent.com/dani-garcia/vaultwarden/main/resources/vaultwarden-icon.svg
  allowRollback: true
  statusInformers:
    - deployment/vaultwarden
  ports:
    - serviceName: vaultwarden
      servicePort: 80
      localPort: 8080
      applicationUrl: "http://vaultwarden"
